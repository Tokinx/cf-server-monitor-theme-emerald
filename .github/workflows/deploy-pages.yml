name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check GitHub Pages status
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status="$(curl --silent --output /tmp/github-pages.json --write-out '%{http_code}' \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")"
          case "${status}" in
            200)
              echo "enabled=true" >> "${GITHUB_OUTPUT}"
              ;;
            404)
              echo "enabled=false" >> "${GITHUB_OUTPUT}"
              echo "::notice::GitHub Pages is not enabled; skipping build and deployment."
              ;;
            *)
              echo "::error::Unable to check GitHub Pages status (HTTP ${status})."
              cat /tmp/github-pages.json
              exit 1
              ;;
          esac
      - uses: actions/checkout@v4
        if: steps.pages.outputs.enabled == 'true'
      - uses: oven-sh/setup-bun@v2
        if: steps.pages.outputs.enabled == 'true'
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
        if: steps.pages.outputs.enabled == 'true'
      - run: bun run build:github-page
        if: steps.pages.outputs.enabled == 'true'
        env:
          API_BASE: ${{ vars.API_BASE }}
          BASE_PATH: ./
          PROXY_BACKEND: false
      - uses: actions/configure-pages@v6
        if: steps.pages.outputs.enabled == 'true'
      - uses: actions/upload-pages-artifact@v4
        if: steps.pages.outputs.enabled == 'true'
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5
        if: steps.pages.outputs.enabled == 'true'
